services:
  - type: web
    name: careerfit-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm ci && npm run db:init
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: careerfit-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: CLIENT_URL
        fromService:
          type: web
          name: careerfit-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: PERSIST_UPLOADS
        value: 'false'

  - type: web
    name: careerfit-web
    runtime: static
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: careerfit-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: careerfit-db
    databaseName: careerfit
    user: careerfit
    plan: free
    ipAllowList: []
